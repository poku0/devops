name: create infrastructure using terraform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      # AWS credentials are obtained via OIDC and a role assumption.  
      # Set `AWS_ROLE_ARN` as a repository secret pointing to the
      # role the job should assume.
      db_username:
        description: "Database username"
        required: true
      db_password:
        description: "Database password"
        required: true
      action:
        description: "Action to perform (apply or destroy)"
        required: true
        default: "apply"

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.1.7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # `AWS_ROLE_ARN` should point to an IAM role with a trust policy
          # allowing the GitHub OIDC provider. See repo documentation.
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Plan
        run: terraform -chdir=terraform plan -var="db_username=${{ github.event.inputs.db_username }}" -var="db_password=${{ github.event.inputs.db_password }}" -out=plan.out

      - name: save plan
        uses: actions/upload-artifact@v6
        with:
          name: terraform-plan
          path: terraform/plan.out

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform -chdir=terraform apply -auto-approve plan.out

      - name: Terraform destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform -chdir=terraform destroy -auto-approve -var="db_username=${{ github.event.inputs.db_username }}" -var="db_password=${{ github.event.inputs.db_password }}"