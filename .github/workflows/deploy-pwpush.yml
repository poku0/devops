name: "CI/CD - Build, Scan, Push, Deploy Password Pusher"

on:
  push:
    branches:
      - main
    paths:
      - "final-project/**"
      - ".github/workflows/deploy-pwpush.yml"
  pull_request:
    branches:
      - main
    paths:
      - "final-project/**"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy after build (yes/no)"
        required: true
        default: "yes"

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/pwpush
  AWS_REGION: eu-central-1
  WORKING_DIR: ./final-project

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Lint
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: final-project/Dockerfile
          failure-threshold: warning

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: final-project/docker-compose.yml
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                check-keys: false

  # ──────────────────────────────────────────────
  # Stage 2: Build & Scan
  # ──────────────────────────────────────────────
  build-and-scan:
    name: 🏗️ Build & 🔒 Scan
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build Docker image (local)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIR }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.DOCKER_IMAGE }}:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Stage 3: Deploy via SSM
  # ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy

      - name: Copy project files to EC2 via SSM
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"

          # Create a tarball of the deployment files
          tar -czf /tmp/deploy-bundle.tar.gz \
            -C final-project \
            docker-compose.yml \
            monitoring/

          # Encode as base64 for SSM
          BUNDLE_B64=$(base64 -w0 /tmp/deploy-bundle.tar.gz)

          # Send the bundle to EC2 and extract
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'echo \"$BUNDLE_B64\" | base64 -d > /tmp/deploy-bundle.tar.gz',
              'tar -xzf /tmp/deploy-bundle.tar.gz -C /opt/pwpush/',
              'rm /tmp/deploy-bundle.tar.gz'
            ]" \
            --timeout-seconds 120 \
            --region "${{ env.AWS_REGION }}" \
            --output text \
            --query "Command.CommandId"

          # Wait for the file copy to complete
          sleep 15

      - name: Deploy application via SSM RunCommand
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          IMAGE_TAG="${{ env.DOCKER_IMAGE }}:${{ github.sha }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'cd /opt/pwpush',
              'sed -i \"s|^DOCKER_IMAGE=.*|DOCKER_IMAGE=$IMAGE_TAG|\" .env',
              'docker compose pull',
              'docker compose up -d --remove-orphans',
              'sleep 30',
              'curl -sf http://localhost:5100/ > /dev/null && echo HEALTHY || echo UNHEALTHY',
              'docker image prune -f'
            ]" \
            --timeout-seconds 300 \
            --region "${{ env.AWS_REGION }}" \
            --output text \
            --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "${{ env.AWS_REGION }}" || true

          # Get command output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "${{ env.AWS_REGION }}" \
            --query "[Status, StandardOutputContent, StandardErrorContent]" \
            --output text

  # ──────────────────────────────────────────────
  # Stage 4: Post-deployment health checks
  # ──────────────────────────────────────────────
  health-check:
    name: ✅ Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r final-project/tests/requirements.txt

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Run health check tests
        env:
          APP_URL: https://${{ secrets.APP_DOMAIN }}
          HEALTH_CHECK_RETRIES: "12"
          HEALTH_CHECK_DELAY: "10"
        run: pytest final-project/tests/test_health.py -v --tb=short

      - name: Curl health check (backup)
        run: |
          echo "=== Direct curl health check ==="
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://${{ secrets.APP_DOMAIN }}" || echo "000")
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "301" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ Application is healthy"
          else
            echo "❌ Application health check failed"
            exit 1
          fi
